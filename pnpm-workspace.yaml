packages:
  - .
  - builtin-agent
minimumReleaseAge: 0
allowBuilds:
  agent-browser: true
  esbuild: true
  tree-sitter-bash: true
  vue-demi: true
  edgedriver: true
  geckodriver: true
  lefthook: false
  '@moonshot-ai/kimi-code': true
  koffi: true
  node-pty: true
  '@tree-sitter-grammars/tree-sitter-markdown': set this to true or false
  tree-sitter-cli: set this to true or false
