syntax = "proto3";

package calamex.wsl_link.v1;

// WSL Link 的跨 VM 协议契约。所有请求必须带 session / seq / ack，
// 用于断线恢复、进程内恢复和幂等去重。
//
// Stage 2 起,Noise 加密下沉到传输层 (NoiseStream),proto 层不再承担
// 密码学职责。OpenSession 仅负责会话簿记 (session_id / seq / ack)。
service WslLink {
  rpc OpenSession(OpenSessionRequest) returns (OpenSessionResponse);
  rpc ResumeSession(ResumeSessionRequest) returns (ResumeSessionResponse);
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
  rpc Duplex(stream ClientFrame) returns (stream ServerFrame);
}

enum TransportKind {
  TRANSPORT_KIND_UNSPECIFIED = 0;
  TRANSPORT_KIND_VSOCK_GRPC = 1;
}

message OpenSessionRequest {
  string client_id = 1;
  string protocol_version = 2;
  uint64 last_client_seq = 3;
  string trace_id = 4;
}

message OpenSessionResponse {
  string session_id = 1;
  uint64 server_seq = 2;
  uint64 ack_client_seq = 3;
  TransportKind transport = 4;
}

message ResumeSessionRequest {
  string session_id = 1;
  uint64 last_ack_server_seq = 2;
  uint64 last_client_seq = 3;
  string trace_id = 4;
}

message ResumeSessionResponse {
  bool accepted = 1;
  uint64 server_seq = 2;
  uint64 ack_client_seq = 3;
  string reason = 4;
}

message HeartbeatRequest {
  string session_id = 1;
  uint64 client_seq = 2;
  uint64 ack_server_seq = 3;
  int64 sent_at_unix_ms = 4;
}

message HeartbeatResponse {
  string session_id = 1;
  uint64 server_seq = 2;
  uint64 ack_client_seq = 3;
  int64 received_at_unix_ms = 4;
}

message ClientFrame {
  string session_id = 1;
  string request_id = 2;
  // 保留给上层审计 / 兼容，agent 去重主键固定为 (session_id, client_seq)。
  string idempotency_key = 3;
  uint64 client_seq = 4;
  uint64 ack_server_seq = 5;
  bytes payload = 6;
  string trace_id = 7;
}

message ServerFrame {
  string session_id = 1;
  string request_id = 2;
  uint64 server_seq = 3;
  uint64 ack_client_seq = 4;
  bytes payload = 5;
  string trace_id = 6;
}